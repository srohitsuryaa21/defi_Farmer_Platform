<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/">DeFi Farmer Platform</a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="mb-4">Add Product Batch</h2>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Crop Name</label>
                            <input type="text" name="crop_name" class="form-control" placeholder="e.g. Tomato" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="text" name="quantity" class="form-control" placeholder="e.g. 100 kg" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" placeholder="Farm location" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Harvest Date</label>
                            <input type="date" name="harvest_date" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="text" name="price" class="form-control" placeholder="e.g. 5000" required>
                        </div>

                        <button type="submit" class="btn btn-success">Add Product</button>
                        <a href="/farmer/dashboard" class="btn btn-outline-secondary">Back to Dashboard</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
